experiment_0:
  name: "gravity_long_epoch_regularized"
  data_params:
    n_train: 100
    n_val: 20
    force_fn: "gravity"
  train_params:
    gnn_hp:
      hidden: 256
      msg_dim: 32
    gkan_hp:
      hidden_layers: 1
      hidden: 8
      msg_dim: 4
      grid_size: 5
      lamb_l1: 1.0
      lamb_entropy: 2.0
    training_hp:
      epochs: 50
      batch_size: 16
      kan_batch_size: 16
      lr: 1e-3
      lamb: 0.1
  visualization_params:
    save_video: True
    plot_splines: True

experiment_0_a:
  name: "gravity_long_epoch"
  data_params:
    n_train: 100
    n_val: 20
    force_fn: "gravity"
  train_params:
    gnn_hp:
      hidden: 256
      msg_dim: 32
    gkan_hp:
      hidden_layers: 1
      hidden: 8
      msg_dim: 4
      grid_size: 5
      lamb_l1: 0
      lamb_entropy: 0
    training_hp:
      epochs: 50
      batch_size: 16
      kan_batch_size: 16
      lr: 1e-3
      lamb: 0
  visualization_params:
    save_video: True
    plot_splines: True


experiment_regularization_control:
  name: "regularization_control"
  data_dir: "data/gravity_regularization"
  data_params:
    n_body: 3
    n_train: 1000
    n_val: 100
    force_fn: "gravity"
  train_params:
    train_baseline: True
    gnn_hp:
      hidden: 128
      msg_dim: 128
    gkan_hp:
      msg_width: [10, 16, 16, 16]
      node_width: [21, 16, 16, 2]
      grid_size: 5
      lamb_l1: 0.0
      lamb_entropy: 0.0
      lbfgs_lr: 1.0
      lbfgs_max_iter: 15
      lbfgs_max_eval: null
      lbfgs_line_search_fn: strong_wolfe
      lbfgs_impl: pykan
      lbfgs_tolerance_ys: 1e-32
      adam_warmup_epochs: 20
      grid_update_freq: 15
      grid_update_warmup: 5
      max_grid_updates: 0
      gradient_clip: 1.0
    training_hp:
      epochs: 50
      batch_size: 32
      kan_batch_size: 32
      lr: 5e-3
      lamb: 0.00
      kan_square_loss: False
  visualization_params:
    save_video: True
    plot_splines: True
# Cranmer-comparable OGN baseline. Architecture matches the reference
# implementation (hidden=300, msg_dim=100). Uses our mean() loss convention
# (Cranmer used sum()), so lr is not directly comparable to his 1e-3.
baseline:
  name: "baseline"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_gkan: False
    gnn_hp:
      hidden: 300
      msg_dim: 100
    training_hp:
      epochs: 50
      batch_size: 64
      lr: 1e-3
      lamb: 0.00
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True
regularization_control:
  name: "regularization_control"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
    gnn_hp:
      hidden: 128
      msg_dim: 128
    gkan_hp:
      msg_width: [10, 16, 16, 16]
      node_width: [21, 16, 16, 2]
      lamb_l1: 0.0
      lamb_entropy: 0.0
      lbfgs_max_iter: 30
      lbfgs_impl: pykan
      lbfgs_tolerance_ys: 1e-32
      max_grid_updates: 0
      sparse_init: False
    training_hp:
      epochs: 50
      batch_size: 32
      kan_batch_size: 32
      lr: 5e-3
      lamb: 0.00
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True
regularization_l1-3:
  name: "regularization_l1-3"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      msg_width: [10, 16, 16, 16]
      node_width: [21, 16, 16, 2]
      lamb_l1: 3.0
      lamb_entropy: 0.0
      lbfgs_max_iter: 30
      lbfgs_impl: pykan
      lbfgs_tolerance_ys: 1e-32
      max_grid_updates: 0
      sparse_init: False
    training_hp:
      epochs: 50
      batch_size: 32
      kan_batch_size: 32
      lr: 5e-3
      lamb: 0.00
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True
regularization_sparseinit:
  name: "regularization_sparseinit"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      msg_width: [10, 16, 16, 16]
      node_width: [21, 16, 16, 2]
      lamb_l1: 0.0
      lamb_entropy: 0.0
      lbfgs_max_iter: 30
      lbfgs_impl: pykan
      lbfgs_tolerance_ys: 1e-32
      adam_warmup_epochs: 20
      grid_update_freq: 15
      grid_update_warmup: 5
      max_grid_updates: 0
      gradient_clip: 1.0
      sparse_init: True
    training_hp:
      epochs: 50
      batch_size: 32
      kan_batch_size: 32
      lr: 5e-3
      lamb: 0.00
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True
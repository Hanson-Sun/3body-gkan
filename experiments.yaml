# Cranmer-comparable OGN baseline. Architecture matches the reference
# implementation (hidden=300, msg_dim=100). Uses our mean() loss convention
# (Cranmer used sum()), so lr is not directly comparable to his 1e-3.
baseline:
  name: "baseline"
  data_dir: "/content/drive/MyDrive/3body-project/data"
  checkpoint_dir: "/content/drive/MyDrive/3body-project/checkpoints"
  output_dir: "/content/drive/MyDrive/3body-project/outputs"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    num_workers: 0
    train_gkan: False
    gnn_hp:
      hidden: 300
      msg_dim: 100
    gkan_hp:
      msg_width: [10, 2, 2, 2]
      node_width: [7, 2]
    training_hp:
      epochs: 50
      batch_size: 256
      lr: 1e-3
      lamb: 0.00
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True


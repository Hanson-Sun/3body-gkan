experiment_1:
  name: "gravity"
  data_params:
    n_train: 100
    n_val: 20
    force_fn: 'gravity'
  train_params:
    gnn_hp:
      hidden: 200
      msg_dim: 32
    gkan_hp:
      hidden_layers: 1
      hidden: 8  
      msg_dim: 8
      grid_size: 5 
    training_hp:
      epoch: 5
      batch_size: 16
      kan_batch_size: 16
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

experiment_2:
  name: "linear_gravity"
  data_params:
    n_train: 100
    n_val: 20
    force_fn: 'linear_gravity'
  train_params:
    gnn_hp:
      hidden: 200
      msg_dim: 32
    gkan_hp:
      hidden_layers: 1
      hidden: 8  
      msg_dim: 16
      grid_size: 5
    training_hp:
      epoch: 5
      batch_size: 16
      kan_batch_size: 16
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True


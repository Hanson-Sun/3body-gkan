testing_gnn:
  name: "testing_gnn"
  data_dir: "/content/drive/MyDrive/3body-project/tests/data"
  checkpoint_dir: "/content/drive/MyDrive/3body-project/tests/checkpoints"
  output_dir: "/content/drive/MyDrive/3body-project/tests/outputs"
  data_params:
    n_train: 10
    n_val: 1
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    num_workers: 0
    train_gkan: False
    gnn_hp:
      hidden: 300
      msg_dim: 100
    gkan_hp:
      msg_width: [10, 2, 2, 2]
      node_width: [7, 2]
    training_hp:
      epochs: 2
      batch_size: 64
      lr: 1e-3
      lamb: 0.00
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True

  output_dir: "/content/drive/MyDrive/3body-project/outputs"
  data_params:
    n_train: 1000
    n_val: 100
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    num_workers: 0
    train_baseline: False
    gkan_hp:
      msg_width: [10, 16, 16, 16]
      node_width: [21, 16, 16, 2]
      lamb_l1: 0.0
      lamb_entropy: 0.0
      lbfgs_max_iter: 30
      lbfgs_impl: pykan
      lbfgs_tolerance_ys: 1e-32
      max_grid_updates: 0
      sparse_init: False
    training_hp:
      epochs: 50
      batch_size: 32
      kan_batch_size: 32
      lr: 5e-3
      lamb: 0.00
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True


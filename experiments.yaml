# Cranmer-comparable OGN baseline. Architecture matches the reference
# implementation (hidden=300, msg_dim=100). Uses our mean() loss convention
# (Cranmer used sum()), so lr is not directly comparable to his 1e-3.
baseline:
  name: "baseline"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_gkan: False
    gnn_hp:
      hidden: 300
      msg_dim: 100
    training_hp:
      epochs: 50
      batch_size: 64
      lr: 1e-3
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True

# Analytical minimum pure-KAN for gravity (no mult nodes).
# Derived from K-A decomposition of Newton's law a = G*m_j*(r_j-r_i)/|r|^3:
#   msg Layer 1 (10->3): extract dx=px_j-px_i, dy=py_j-py_i, m_j
#     h_1 = id(px_j) + (-id)(px_i) = dx
#     h_2 = id(py_j) + (-id)(py_i) = dy
#     h_3 = id(m_j)
#   msg Layer 2 (3->5):  r^2 via squaring; polarization sums m_j+/-dx, m_j+/-dy
#     h_4 = sq(dx)  + sq(dy) = r^2      (sum of univariate squares)
#     h_5 = id(m_j) + id(dx) = m_j + dx (prepare m_j*dx)
#     h_6 = id(m_j) - id(dx) = m_j - dx
#     h_7 = id(m_j) + id(dy) = m_j + dy (prepare m_j*dy)
#     h_8 = id(m_j) - id(dy) = m_j - dy
#   msg Layer 3 (5->3):  products m_j*dx, m_j*dy via polarization; r^{-2} univariate
#     h_9  = sq(h_5)/4 - sq(h_6)/4 = m_j * dx
#     h_10 = sq(h_7)/4 - sq(h_8)/4 = m_j * dy
#     h_11 = inv(h_4)       = r^{-2}   (univariate: t -> t^{-3/2})
#   msg Layer 4 (3->4):  polarization sums (m_j*dx)+/-r^{-2}, (m_j*dy)+/-r^{-2}
#     h_12 = id(h_9)  + id(h_11) = m_j*dx + r^{-2}
#     h_13 = id(h_9)  - id(h_11) = m_j*dx - r^{-2}
#     h_14 = id(h_10) + id(h_11) = m_j*dy + r^{-2}
#     h_15 = id(h_10) - id(h_11) = m_j*dy - r^{-2}
#   msg Layer 5 (4->2):  final products -> (a_x, a_y)
#     msg_x = sq(h_12)/4 - sq(h_13)/4 = m_j * dx * r^{-2}
#     msg_y = sq(h_14)/4 - sq(h_15)/4 = m_j * dy * r^{-2}
#   node Layer 1 (7->2): identity passthrough of aggregated acceleration
#     a_x = id(msg_x)
#     a_y = id(msg_y)
minimal:
  name: "minimal"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      msg_width: [ 10, 3, 5, 3, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Optimized 4-layer minimal: merges extraction with polarization prep.
# Trades width for depth (max width 6 vs 5, but 4 layers vs 5).
# Eliminates the width-3 bottleneck that caused activation collapse.
# K-A decomposition of a = G*m_j*(r_j-r_i)/|r|^3:
#   msg Layer 1 (10->6): extract dx,dy AND prepare polarization sums
#     h_1 = id(px_j) + (-id)(px_i) = dx
#     h_2 = id(py_j) + (-id)(py_i) = dy
#     h_3 = id(m_j) + id(px_j) + (-id)(px_i) = m_j + dx
#     h_4 = id(m_j) - id(px_j) + id(px_i) = m_j - dx
#     h_5 = id(m_j) + id(py_j) + (-id)(py_i) = m_j + dy
#     h_6 = id(m_j) - id(py_j) + id(py_i) = m_j - dy
#   msg Layer 2 (6->3): r^2 via squaring; products m_j*dx, m_j*dy via polarization
#     h_7 = sq(h_1) + sq(h_2) = dx^2 + dy^2 = r^2
#     h_8 = sq(h_3)/4 - sq(h_4)/4 = m_j * dx     (polarization identity)
#     h_9 = sq(h_5)/4 - sq(h_6)/4 = m_j * dy
#   msg Layer 3 (3->4): r^{-2} merged with polarization prep for final products
#     h_10 = inv(h_7) + id(h_8) = r^{-2} + m_j*dx
#     h_11 = -inv(h_7) + id(h_8) = m_j*dx - r^{-2}
#     h_12 = inv(h_7) + id(h_9) = r^{-2} + m_j*dy
#     h_13 = -inv(h_7) + id(h_9) = m_j*dy - r^{-2}
#   msg Layer 4 (4->2): final products -> (a_x, a_y)
#     F_x = sq(h_10)/4 - sq(h_11)/4 = m_j * dx * r^{-2}
#     F_y = sq(h_12)/4 - sq(h_13)/4 = m_j * dy * r^{-2}
#   node Layer 1 (7->2): identity passthrough of aggregated acceleration
#     a_x = id(F_x)
#     a_y = id(F_y)
minimal_merged:
  name: "minimal_merged"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      msg_width: [ 10, 6, 3, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Augmented with rel_pos (dx, dy). Eliminates extraction layer — dx, dy
# are directly available so r^2 = sq(dx)+sq(dy) computes in Layer 1.
# Input: [px_i, py_i, vx_i, vy_i, m_i, px_j, py_j, vx_j, vy_j, m_j, dx, dy] = 12D.
# K-A decomposition of a = G*m_j*(r_j-r_i)/|r|^3:
#   msg Layer 1 (12->5): r^2 from augmented dx,dy; polarization prep m_j +/- dx,dy
#     h_1 = sq(dx) + sq(dy) = r^2
#     h_2 = id(m_j) + id(dx) = m_j + dx
#     h_3 = id(m_j) - id(dx) = m_j - dx
#     h_4 = id(m_j) + id(dy) = m_j + dy
#     h_5 = id(m_j) - id(dy) = m_j - dy
#   msg Layer 2 (5->4): products + r^{-2} merged into polarization prep
#     Each output combines polarization product (sq/4 terms) with r^{-2}:
#     h_6 = sq(h_2)/4 - sq(h_3)/4 + inv(h_1) = m_j*dx + r^{-2}
#     h_7 = sq(h_2)/4 - sq(h_3)/4 - inv(h_1) = m_j*dx - r^{-2}
#     h_8 = sq(h_4)/4 - sq(h_5)/4 + inv(h_1) = m_j*dy + r^{-2}
#     h_9 = sq(h_4)/4 - sq(h_5)/4 - inv(h_1) = m_j*dy - r^{-2}
#   msg Layer 3 (4->2): final products -> (a_x, a_y)
#     F_x = sq(h_6)/4 - sq(h_7)/4 = m_j * dx * r^{-2}
#     F_y = sq(h_8)/4 - sq(h_9)/4 = m_j * dy * r^{-2}
#   node Layer 1 (7->2): identity passthrough
minimal_rel_pos:
  name: "minimal_rel_pos"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "rel_pos" ]
      msg_width: [ 12, 5, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Augmented with rel_pos + dist_sq. Same 3-layer structure as rel_pos,
# but Layer 1 is pure id/-id (r^2 is an input, no sq() needed).
# Input: [..., dx, dy, r^2] = 13D.
# K-A decomposition:
#   msg Layer 1 (13->5): pure id/-id extraction (simplest possible layer)
#     h_1 = id(r^2)                               (pass through)
#     h_2 = id(m_j) + id(dx) = m_j + dx
#     h_3 = id(m_j) - id(dx) = m_j - dx
#     h_4 = id(m_j) + id(dy) = m_j + dy
#     h_5 = id(m_j) - id(dy) = m_j - dy
#   msg Layer 2 (5->4): products + r^{-2} merged (same as rel_pos L2)
#     h_6 = sq(h_2)/4 - sq(h_3)/4 + inv(h_1) = m_j*dx + r^{-2}
#     h_7 = sq(h_2)/4 - sq(h_3)/4 - inv(h_1) = m_j*dx - r^{-2}
#     h_8 = sq(h_4)/4 - sq(h_5)/4 + inv(h_1) = m_j*dy + r^{-2}
#     h_9 = sq(h_4)/4 - sq(h_5)/4 - inv(h_1) = m_j*dy - r^{-2}
#   msg Layer 3 (4->2): final products
#     F_x = sq(h_6)/4 - sq(h_7)/4
#     F_y = sq(h_8)/4 - sq(h_9)/4
#   node Layer 1 (7->2): identity passthrough
minimal_rel_pos_dsq:
  name: "minimal_rel_pos_dsq"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "rel_pos", "dist_sq" ]
      msg_width: [ 13, 5, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Augmented with rel_pos + inv_dist_sq. r^{-2} is precomputed, so
# splines never need to learn inv. Regroups as (m_j*r^{-2})*dx.
# All phi are id/-id/sq only — simplest possible spline functions.
# Input: [..., dx, dy, r^{-2}] = 13D.
# K-A decomposition:
#   msg Layer 1 (13->4): polarization prep for m_j * r^{-2}; pass dx, dy
#     h_1 = id(m_j) + id(r^{-2}) = m_j + r^{-2}
#     h_2 = id(m_j) - id(r^{-2}) = m_j - r^{-2}
#     h_3 = id(dx)
#     h_4 = id(dy)
#   msg Layer 2 (4->4): g = m_j*r^{-2} via polarization; merge g +/- dx, dy
#     h_5 = sq(h_1)/4 - sq(h_2)/4 + id(h_3) = g + dx
#     h_6 = sq(h_1)/4 - sq(h_2)/4 - id(h_3) = g - dx
#     h_7 = sq(h_1)/4 - sq(h_2)/4 + id(h_4) = g + dy
#     h_8 = sq(h_1)/4 - sq(h_2)/4 - id(h_4) = g - dy
#   msg Layer 3 (4->2): final products
#     F_x = sq(h_5)/4 - sq(h_6)/4 = m_j * r^{-2} * dx
#     F_y = sq(h_7)/4 - sq(h_8)/4 = m_j * r^{-2} * dy
#   node Layer 1 (7->2): identity passthrough
minimal_rel_pos_idc:
  name: "minimal_rel_pos_idc"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "rel_pos", "inv_dist_sq" ]
      msg_width: [ 13, 4, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Augmented with rel_pos + mass_weighted_rel_pos. Products m_j*dx, m_j*dy
# are precomputed, but r^{-2} still requires 2 compositions from dx, dy
# (sum-of-squares then power), so this is 3 layers, not 2.
# Input: [..., dx, dy, m_j*dx, m_j*dy] = 14D.
# K-A decomposition:
#   msg Layer 1 (14->3): compute r^2 from dx,dy; pass through mrdx, mrdy
#     h_1 = sq(dx) + sq(dy) = r^2
#     h_2 = id(m_j*dx)                            (pass through)
#     h_3 = id(m_j*dy)                            (pass through)
#   msg Layer 2 (3->4): r^{-2} merged with polarization prep
#     h_4 = inv(h_1) + id(h_2) = r^{-2} + m_j*dx
#     h_5 = -inv(h_1) + id(h_2) = m_j*dx - r^{-2}
#     h_6 = inv(h_1) + id(h_3) = r^{-2} + m_j*dy
#     h_7 = -inv(h_1) + id(h_3) = m_j*dy - r^{-2}
#   msg Layer 3 (4->2): final products
#     F_x = sq(h_4)/4 - sq(h_5)/4 = m_j*dx * r^{-2}
#     F_y = sq(h_6)/4 - sq(h_7)/4 = m_j*dy * r^{-2}
#   node Layer 1 (7->2): identity passthrough
minimal_rel_pos_mwrp:
  name: "minimal_rel_pos_mwrp"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "rel_pos", "mass_weighted_rel_pos" ]
      msg_width: [ 14, 3, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Augmented with mass_weighted_rel_pos + inv_dist_sq. Minimum 2-layer
# architecture: both products m_j*dx, m_j*dy and r^{-2} are precomputed,
# leaving only one binary multiplication per output.
# All phi are id/-id/sq only — simplest possible spline functions.
# Input: [..., m_j*dx, m_j*dy, r^{-2}] = 13D.
# K-A decomposition:
#   msg Layer 1 (13->4): pure id/-id polarization prep
#     h_1 = id(m_j*dx) + id(r^{-2}) = m_j*dx + r^{-2}
#     h_2 = id(m_j*dx) - id(r^{-2}) = m_j*dx - r^{-2}
#     h_3 = id(m_j*dy) + id(r^{-2}) = m_j*dy + r^{-2}
#     h_4 = id(m_j*dy) - id(r^{-2}) = m_j*dy - r^{-2}
#   msg Layer 2 (4->2): pure sq/-sq final products
#     F_x = sq(h_1)/4 - sq(h_2)/4 = m_j*dx * r^{-2}
#     F_y = sq(h_3)/4 - sq(h_4)/4 = m_j*dy * r^{-2}
#   node Layer 1 (7->2): identity passthrough
minimal_mwrp_idc:
  name: "minimal_mwrp_idc"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "mass_weighted_rel_pos", "inv_dist_sq" ]
      msg_width: [ 13, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Full augmentation: rel_pos + mass_weighted_rel_pos + inv_dist_sq.
# Same 2-layer structure as mwrp_idc, with extra (redundant) dx, dy
# inputs. The extra dimensions don't reduce layers but may provide
# additional signal that helps spline learning.
# Input: [..., dx, dy, m_j*dx, m_j*dy, r^{-2}] = 15D.
# K-A decomposition: identical to mwrp_idc (dx, dy unused in minimum)
#   msg Layer 1 (15->4): pure id/-id polarization prep
#     h_1 = id(m_j*dx) + id(r^{-2}) = m_j*dx + r^{-2}
#     h_2 = id(m_j*dx) - id(r^{-2}) = m_j*dx - r^{-2}
#     h_3 = id(m_j*dy) + id(r^{-2}) = m_j*dy + r^{-2}
#     h_4 = id(m_j*dy) - id(r^{-2}) = m_j*dy - r^{-2}
#   msg Layer 2 (4->2): pure sq/-sq final products
#     F_x = sq(h_1)/4 - sq(h_2)/4 = m_j*dx * r^{-2}
#     F_y = sq(h_3)/4 - sq(h_4)/4 = m_j*dy * r^{-2}
#   node Layer 1 (7->2): identity passthrough
minimal_full_aug:
  name: "minimal_full_aug"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "rel_pos", "mass_weighted_rel_pos", "inv_dist_sq" ]
      msg_width: [ 15, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Cranmer-comparable OGN baseline. Architecture matches the reference
# implementation (hidden=300, msg_dim=100). Uses our mean() loss convention
# (Cranmer used sum()), so lr is not directly comparable to his 1e-3.
baseline:
  name: "baseline"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_gkan: False
    gnn_hp:
      hidden: 300
      msg_dim: 100
    training_hp:
      epochs: 50
      batch_size: 64
      lr: 1e-3
      augment: True
      augmentation_scale: 3.0
  visualization_params:
    save_video: True
    plot_splines: True

# Optimized 4-layer minimal: merges extraction with polarization prep.
# Trades width for depth (max width 6 vs 5, but 4 layers vs 5).
# Eliminates the width-3 bottleneck that caused activation collapse.
# K-A decomposition of a = G*m_j*(r_j-r_i)/|r|^3:
#   msg Layer 1 (10->6): extract dx,dy AND prepare polarization sums
#     h_1 = id(px_j) + (-id)(px_i) = dx
#     h_2 = id(py_j) + (-id)(py_i) = dy
#     h_3 = id(m_j) + id(px_j) + (-id)(px_i) = m_j + dx
#     h_4 = id(m_j) - id(px_j) + id(px_i) = m_j - dx
#     h_5 = id(m_j) + id(py_j) + (-id)(py_i) = m_j + dy
#     h_6 = id(m_j) - id(py_j) + id(py_i) = m_j - dy
#   msg Layer 2 (6->3): r^2 via squaring; products m_j*dx, m_j*dy via polarization
#     h_7 = sq(h_1) + sq(h_2) = dx^2 + dy^2 = r^2
#     h_8 = sq(h_3)/4 - sq(h_4)/4 = m_j * dx     (polarization identity)
#     h_9 = sq(h_5)/4 - sq(h_6)/4 = m_j * dy
#   msg Layer 3 (3->4): r^{-3} merged with polarization prep for final products
#     h_10 = inv_pow(h_7) + id(h_8) = r^{-3} + m_j*dx
#     h_11 = -inv_pow(h_7) + id(h_8) = m_j*dx - r^{-3}
#     h_12 = inv_pow(h_7) + id(h_9) = r^{-3} + m_j*dy
#     h_13 = -inv_pow(h_7) + id(h_9) = m_j*dy - r^{-3}
#   msg Layer 4 (4->2): final products -> (a_x, a_y)
#     F_x = sq(h_10)/4 - sq(h_11)/4 = m_j * dx * r^{-3}
#     F_y = sq(h_12)/4 - sq(h_13)/4 = m_j * dy * r^{-3}
#   node Layer 1 (7->2): identity passthrough of aggregated acceleration
#     a_x = id(F_x)
#     a_y = id(F_y)
small:
  name: "small"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      msg_width: [ 10, 6, 3, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Augmented with rel_pos (dx, dy). Eliminates extraction layer — dx, dy
# are directly available so r^2 = sq(dx)+sq(dy) computes in Layer 1.
# Input: [px_i, py_i, vx_i, vy_i, m_i, px_j, py_j, vx_j, vy_j, m_j, dx, dy] = 12D.
# K-A decomposition of a = G*m_j*(r_j-r_i)/|r|^3:
#   msg Layer 1 (12->5): r^2 from augmented dx,dy; polarization prep m_j +/- dx,dy
#     h_1 = sq(dx) + sq(dy) = r^2
#     h_2 = id(m_j) + id(dx) = m_j + dx
#     h_3 = id(m_j) - id(dx) = m_j - dx
#     h_4 = id(m_j) + id(dy) = m_j + dy
#     h_5 = id(m_j) - id(dy) = m_j - dy
#   msg Layer 2 (5->4): products + r^{-3} merged into polarization prep
#     Each output combines polarization product (sq/4 terms) with r^{-3}:
#     h_6 = sq(h_2)/4 - sq(h_3)/4 + inv_pow(h_1) = m_j*dx + r^{-3}
#     h_7 = sq(h_2)/4 - sq(h_3)/4 - inv_pow(h_1) = m_j*dx - r^{-3}
#     h_8 = sq(h_4)/4 - sq(h_5)/4 + inv_pow(h_1) = m_j*dy + r^{-3}
#     h_9 = sq(h_4)/4 - sq(h_5)/4 - inv_pow(h_1) = m_j*dy - r^{-3}
#   msg Layer 3 (4->2): final products -> (a_x, a_y)
#     F_x = sq(h_6)/4 - sq(h_7)/4 = m_j * dx * r^{-3}
#     F_y = sq(h_8)/4 - sq(h_9)/4 = m_j * dy * r^{-3}
#   node Layer 1 (7->2): identity passthrough
small_rel_pos:
  name: "small_rel_pos"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "rel_pos" ]
      msg_width: [ 12, 5, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Augmented with rel_pos + dist_sq. Same 3-layer structure as rel_pos,
# but Layer 1 is pure id/-id (r^2 is an input, no sq() needed).
# Input: [..., dx, dy, r^2] = 13D.
# K-A decomposition:
#   msg Layer 1 (13->5): pure id/-id extraction (simplest possible layer)
#     h_1 = id(r^2)                               (pass through)
#     h_2 = id(m_j) + id(dx) = m_j + dx
#     h_3 = id(m_j) - id(dx) = m_j - dx
#     h_4 = id(m_j) + id(dy) = m_j + dy
#     h_5 = id(m_j) - id(dy) = m_j - dy
#   msg Layer 2 (5->4): products + r^{-3} merged (same as rel_pos L2)
#     h_6 = sq(h_2)/4 - sq(h_3)/4 + inv_pow(h_1) = m_j*dx + r^{-3}
#     h_7 = sq(h_2)/4 - sq(h_3)/4 - inv_pow(h_1) = m_j*dx - r^{-3}
#     h_8 = sq(h_4)/4 - sq(h_5)/4 + inv_pow(h_1) = m_j*dy + r^{-3}
#     h_9 = sq(h_4)/4 - sq(h_5)/4 - inv_pow(h_1) = m_j*dy - r^{-3}
#   msg Layer 3 (4->2): final products
#     F_x = sq(h_6)/4 - sq(h_7)/4
#     F_y = sq(h_8)/4 - sq(h_9)/4
#   node Layer 1 (7->2): identity passthrough
small_rel_pos_dsq:
  name: "small_rel_pos_dsq"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "rel_pos", "dist_sq" ]
      msg_width: [ 13, 5, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True

# Augmented with rel_pos + inv_dist_cu. r^{-3} is precomputed, so
# splines never need to learn inv_pow. Regroups as (m_j*r^{-3})*dx.
# All phi are id/-id/sq only — simplest possible spline functions.
# Input: [..., dx, dy, r^{-3}] = 13D.
# K-A decomposition:
#   msg Layer 1 (13->4): polarization prep for m_j * r^{-3}; pass dx, dy
#     h_1 = id(m_j) + id(r^{-3}) = m_j + r^{-3}
#     h_2 = id(m_j) - id(r^{-3}) = m_j - r^{-3}
#     h_3 = id(dx)
#     h_4 = id(dy)
#   msg Layer 2 (4->4): g = m_j*r^{-3} via polarization; merge g +/- dx, dy
#     h_5 = sq(h_1)/4 - sq(h_2)/4 + id(h_3) = g + dx
#     h_6 = sq(h_1)/4 - sq(h_2)/4 - id(h_3) = g - dx
#     h_7 = sq(h_1)/4 - sq(h_2)/4 + id(h_4) = g + dy
#     h_8 = sq(h_1)/4 - sq(h_2)/4 - id(h_4) = g - dy
#   msg Layer 3 (4->2): final products
#     F_x = sq(h_5)/4 - sq(h_6)/4 = m_j * r^{-3} * dx
#     F_y = sq(h_7)/4 - sq(h_8)/4 = m_j * r^{-3} * dy
#   node Layer 1 (7->2): identity passthrough
small_rel_pos_idc:
  name: "small_rel_pos_idc"
  data_params:
    n_train: 200
    n_val: 20
    force_fn: "gravity"
    min_separation: 0.4
    max_retries: 50
  train_params:
    train_baseline: False
    gkan_hp:
      edge_augmentations: [ "rel_pos", "inv_dist_cu" ]
      msg_width: [ 13, 4, 4, 2 ]
      node_width: [ 7, 2 ]
      sparse_init: False
      adam_warmup_epochs: 50
      max_grid_updates: 0
    training_hp:
      epochs: 50
      kan_adam_batch_size: 64
      lr: 1e-3
  visualization_params:
    save_video: True
    plot_splines: True
